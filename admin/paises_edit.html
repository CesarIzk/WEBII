
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Panel de Admin - MundialFan</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">

</head>

<body>
  <header class="admin-header">
    <div class="header-contenido contenedor d-flex align-items-center justify-content-between">
      <a href="admin/dashboard.html" class="logo d-flex align-items-center gap-2 text-decoration-none text-white">
        <i class="fas fa-shield-halved fa-lg"></i>
        <h1 class="m-0 fs-4">MundialFan - Panel Admin</h1>
      </a>
    </div>
  </header>

  <nav class="admin-nav">
    <div class="nav-wrap d-flex align-items-center justify-content-between">
      <!-- Botón hamburguesa -->
      <button class="menu-toggle admin-toggle btn btn-outline-light" aria-label="Menú">
        <i class="fas fa-bars"></i>
      </button>

      <!-- Menú principal -->
      <ul class="navbar d-flex flex-wrap align-items-center gap-3" id="admin-navbar-menu">
        <li><a href="admin/dashboard.html"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a></li>
        <li><a href="admin/usuarios.html"><i class="fas fa-users-cog"></i> <span>Usuarios</span></a></li>
        <li><a href="admin/publicaciones.html"><i class="fas fa-file-alt"></i> <span>Publicaciones</span></a></li>
        <li><a href="admin/reportes.html"><i class="fas fa-chart-line"></i> <span>Reportes</span></a></li>
        <li><a href="/admin/crear"><i class="fas fa-user-shield"></i> <span>Crear Admin</span></a></li>
        <li><a href="index.html"><i class="fas fa-globe"></i> <span>Ver Sitio</span></a></li>
      </ul>

      <!-- Botones de usuario y modo -->
      <div class="auth-buttons d-flex align-items-center gap-3">
        <!-- Modo oscuro -->
        <button id="toggle-mode-header" class="toggle-btn btn btn-outline-light" aria-label="Cambiar modo">
          <i class="fas fa-moon"></i>
        </button>

        <!-- Perfil -->
        
          <div class="dropdown">
            <button 
              class="btn btn-light btn-sm d-flex align-items-center gap-2"
              id="adminDropdown" 
              data-bs-toggle="dropdown" 
              aria-expanded="false"
            >
              <div class="user-avatar rounded-circle text-white d-flex align-items-center justify-content-center" 
                   style="width:32px; height:32px; background-color:#c0392b;">
                
              </div>
              <span class="d-none d-md-inline text-dark"></span>
              <i class="fas fa-chevron-down small text-muted"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="adminDropdown">
              <li><a class="dropdown-item" href="perfil.html"><i class="fas fa-user me-2"></i> Mi Perfil</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-danger" href="/logout"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión</a></li>
            </ul>
          </div>
        
      </div>
    </div>
  </nav>
<div class="container mt-4">
  <h2><i class="fas fa-edit"></i> Editar País: </h2>

  <form method="POST" action="#">
    <div class="row mt-3">
      <div class="col-md-6">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" value="">
      </div>
      <div class="col-md-6">
        <label>Continente</label>
        <input type="text" name="continente" class="form-control" value="">
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-4">
        <label>Títulos</label>
        <input type="number" name="titulos" class="form-control" value="">
      </div>
      <div class="col-md-4">
        <label>Participaciones</label>
        <input type="number" name="participaciones" class="form-control" value="">
      </div>
      <div class="col-md-4">
        <label>Entrenador</label>
        <input type="text" name="entrenador" class="form-control" value="">
      </div>
    </div>

    <div class="mt-3">
      <label>Mejor Jugador</label>
      <input type="text" name="mejorJugador" class="form-control" value="">
    </div>

    <div class="mt-3">
      <label>Bandera (URL)</label>
      <input type="text" name="bandera" class="form-control" value="">
    </div>

    <div class="mt-3">
      <label>Descripción</label>
      <textarea name="descripcion" rows="3" class="form-control"></textarea>
    </div>

    <div class="mt-3">
      <label>Historia</label>
      <textarea name="historia" rows="5" class="form-control"></textarea>
    </div>

    <button class="btn btn-success mt-4">
      <i class="fas fa-save"></i> Guardar cambios
    </button>
  </form>
</div>


  </main> <footer class="admin-footer mt-5 text-center text-muted">
    <p>&copy;  MundialFan - Panel de Administración</p>
  </footer>

  
  
  
  
  
  
</body>
</html>
