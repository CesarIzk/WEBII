<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Acceso y Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<main class="contenedor" style="padding: 2rem 0 2.5rem;">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
    <h2 class="m-0">Acceso y Registro</h2>
  </div>

  <div class="row g-4">

    <!-- LOGIN -->
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="h5 mb-3"><i class="fas fa-right-to-bracket me-2"></i>Iniciar sesión</h3>
          <div id="login-error" class="text-danger small mb-2" style="display:none;"></div>
          <div id="login-success" class="text-success small mb-2" style="display:none;"></div>

          <div class="row g-3">
            <div class="col-12">
              <input class="form-control" id="login-email" type="email" placeholder="Correo electrónico" required>
            </div>
            <div class="col-12">
              <input class="form-control" id="login-password" type="password" placeholder="Contraseña" required>
            </div>
          </div>

          <button class="btn btn-outline-primary w-100 mt-3" id="btn-login">Iniciar sesión</button>
        </div>
      </div>
    </div>

    <!-- REGISTRO -->
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="h5 mb-3"><i class="fas fa-user-plus me-2"></i>Crear cuenta</h3>
          <div id="register-error" class="text-danger small mb-2" style="display:none;"></div>

          <div class="row g-3">
            <div class="col-12">
              <input class="form-control" id="reg-name" placeholder="Nombre completo" required>
            </div>
            <div class="col-12">
              <input class="form-control" id="reg-username" placeholder="Nombre de usuario" required>
            </div>
            <div class="col-12">
              <input class="form-control" id="reg-email" type="email" placeholder="Correo electrónico" required>
            </div>
            <div class="col-md-6">
              <input class="form-control" id="reg-birth" type="date" required>
            </div>
            <div class="col-md-6">
              <select class="form-select" id="reg-gender" required>
                <option value="">Género</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
                <option value="O">Otro</option>
              </select>
            </div>
            <div class="col-md-6">
              <input class="form-control" id="reg-password" type="password" placeholder="Contraseña" required>
            </div>
            <div class="col-md-6">
              <input class="form-control" id="reg-password2" type="password" placeholder="Confirmar" required>
            </div>
          </div>

          <button class="btn btn-outline-primary w-100 mt-3" id="btn-register">Registrarme</button>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
