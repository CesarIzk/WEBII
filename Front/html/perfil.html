<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<main class="contenedor" style="padding: 2rem 0 2.5rem;">

  <!-- BUSCADOR DE USUARIOS -->
  <section class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <h2 class="h5 m-0"><i class="fas fa-user-group me-2"></i>Buscar usuarios</h2>
      </div>
      <div class="row g-2 align-items-center mb-3">
        <div class="col-12 col-md-8">
          <input class="form-control" type="text" id="user-search-input"
                 placeholder="Buscar por usuario, nombre o correo...">
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button class="btn btn-primary" id="btn-user-search">
            <i class="fas fa-magnifying-glass me-1"></i> Buscar
          </button>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Usuario</th><th>Nombre</th><th style="width:160px;">Acción</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="3" class="text-center py-3" style="opacity:.65;">Busca un usuario para ver resultados.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- PERFIL DEL USUARIO ACTUAL -->
  <section class="card shadow-sm border-0 rounded-4 mb-4 overflow-visible" id="profile-section">

    <!-- Portada + avatar superpuesto -->
    <div style="position:relative;">
      <!-- Portada: overflow hidden solo aquí para respetar el border-radius -->
      <div style="border-radius: 1rem 1rem 0 0; overflow:hidden; position:relative;">
        <div id="profile-cover" style="height:200px; background: linear-gradient(90deg, #b00000 0%, #8b1538 40%, #2d3b87 100%); background-size:cover; background-position:center;"></div>
        <!-- Botón cambiar portada -->
        <label for="cover-upload" title="Cambiar portada"
               style="position:absolute;bottom:10px;right:12px;cursor:pointer;background:rgba(0,0,0,.55);color:#fff;border-radius:8px;padding:5px 12px;font-size:13px;display:flex;align-items:center;gap:6px;z-index:2;">
          <i class="fas fa-camera"></i> Cambiar portada
        </label>
        <input type="file" id="cover-upload" accept="image/*" style="display:none;">
      </div>

      <!-- Avatar fuera del overflow:hidden para que pueda sobresalir -->
      <div style="position:absolute; bottom:-50px; left:28px; z-index:3;">
        <img src="../images/default-profile.jpg" alt="Foto de perfil" id="profile-avatar"
             style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid var(--surface,#fff);display:block;box-shadow:0 2px 8px rgba(0,0,0,.25);">
      </div>
    </div>

    <!-- Info del perfil -->
    <div class="card-body p-4" style="padding-top:4.5rem !important; border-radius: 0 0 1rem 1rem;">
      <div class="d-flex flex-column flex-md-row align-items-md-start gap-3">
        <div class="flex-grow-1" style="min-width:0; word-break:break-word;">
          <h2 class="m-0 fw-bold" id="profile-name">—</h2>
          <p class="m-0" style="opacity:.7;" id="profile-username">@—</p>
        </div>
        <div class="d-grid gap-2" style="min-width:220px;">
          <a href="chat.html" class="btn btn-outline-primary">
            <i class="fas fa-comments me-1"></i> Ir al chat
          </a>
          <a href="configuracion.html" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-cog me-1"></i> Configuración
          </a>
        </div>
      </div>
      <hr class="my-4">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-envelope me-2"></i>Email:</strong> <span id="profile-email">—</span></p>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-cake-candles me-2"></i>Nacimiento:</strong> <span id="profile-birth">—</span></p>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-city me-2"></i>Ciudad:</strong> <span id="profile-city">—</span></p>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-earth-americas me-2"></i>País:</strong> <span id="profile-country">—</span></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- PUBLICACIONES DEL USUARIO -->
  <section class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <h2 class="h5 m-0"><i class="fas fa-newspaper me-2"></i>Mis publicaciones</h2>
        <a class="btn btn-outline-primary btn-sm" href="crear-publicacion.html">
          <i class="fas fa-plus me-1"></i> Crear publicación
        </a>
      </div>
      <div id="my-posts">
        <div class="text-center py-4" style="opacity:.65;">
          <i class="fas fa-spinner fa-spin fa-2x mb-2 d-block"></i> Cargando...
        </div>
      </div>
    </div>
  </section>

</main>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/perfil.js"></script>
</body>
</html>
