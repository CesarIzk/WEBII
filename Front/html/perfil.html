<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<main class="contenedor" style="padding: 2rem 0 2.5rem;">

  <!-- BUSCADOR DE USUARIOS -->
  <section class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <h2 class="h5 m-0"><i class="fas fa-user-group me-2"></i>Buscar usuarios</h2>
      </div>
      <div class="row g-2 align-items-center mb-3">
        <div class="col-12 col-md-8">
          <input class="form-control" type="text" id="user-search-input"
                 placeholder="Buscar por usuario, nombre o correo...">
        </div>
        <div class="col-12 col-md-4 d-grid">
          <button class="btn btn-primary" id="btn-user-search">
            <i class="fas fa-magnifying-glass me-1"></i> Buscar
          </button>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Usuario</th><th>Nombre</th><th style="width:160px;">Acción</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="3" class="text-center py-3" style="opacity:.65;">Busca un usuario para ver resultados.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- PERFIL DEL USUARIO ACTUAL -->
  <section class="card shadow-sm border-0 rounded-4 mb-4 overflow-hidden" id="profile-section">
    <div style="height:140px; background: linear-gradient(90deg, #b00000 0%, #8b1538 40%, #2d3b87 100%);"></div>
    <div class="card-body p-4">
      <div class="d-flex flex-column flex-md-row align-items-md-end gap-3" style="margin-top:-70px;">
        <img src="imagenes/default-profile.jpg" alt="Foto de perfil" id="profile-avatar"
             style="width:140px;height:140px;border-radius:999px;object-fit:cover;border:6px solid var(--surface);">
        <div class="flex-grow-1">
          <h2 class="m-0 fw-bold" id="profile-name">—</h2>
          <p class="m-0" style="opacity:.7;" id="profile-username">@—</p>
        </div>
        <div class="d-grid gap-2" style="min-width:220px;">
          <a href="chat.html" class="btn btn-outline-primary">
            <i class="fas fa-comments me-1"></i> Ir al chat
          </a>
          <a href="configuracion.html" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-cog me-1"></i> Configuración
          </a>
        </div>
      </div>
      <hr class="my-4">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-envelope me-2"></i>Email:</strong> <span id="profile-email">—</span></p>
          </div>
        </div>
        <div class="col-12 col-md-6">
          <div class="p-3 rounded-4" style="background:var(--bg); border:1px solid var(--border);">
            <p class="m-0"><strong><i class="fas fa-cake-candles me-2"></i>Nacimiento:</strong> <span id="profile-birth">—</span></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- PUBLICACIONES DEL USUARIO -->
  <section class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <h2 class="h5 m-0"><i class="fas fa-newspaper me-2"></i>Mis publicaciones</h2>
        <a class="btn btn-outline-primary btn-sm" href="crear-publicacion.html">
          <i class="fas fa-plus me-1"></i> Crear publicación
        </a>
      </div>
      <div id="my-posts">
        <div class="text-center py-4" style="opacity:.65;">
          <i class="fas fa-spinner fa-spin fa-2x mb-2 d-block"></i> Cargando...
        </div>
      </div>
    </div>
  </section>

</main>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

  if (!isLoggedIn()) {
    window.location.href = 'auth.html';
    return;
  }

  const user = getUser();

  // ── Llenar datos del perfil ────────────────────────────
  try {
    const data = await Users.getProfile(user.id);
    const u = data.data ?? data;
    document.getElementById('profile-name').textContent     = u.name ?? '—';
    document.getElementById('profile-username').textContent = '@' + (u.username ?? '—');
    document.getElementById('profile-email').textContent    = u.email ?? '—';
    document.getElementById('profile-birth').textContent    = u.birth_date ?? '—';
    if (u.profile_picture) {
      document.getElementById('profile-avatar').src = `http://localhost:8000/uploads/${u.profile_picture}`;
    }
  } catch (e) {
    // Fallback con datos locales
    document.getElementById('profile-name').textContent     = user.name ?? '—';
    document.getElementById('profile-username').textContent = '@' + (user.username ?? '—');
    document.getElementById('profile-email').textContent    = user.email ?? '—';
  }

  // ── Cargar publicaciones propias ───────────────────────
  const postsEl = document.getElementById('my-posts');
  try {
    const data  = await Posts.getAll({ user_id: user.id });
    const posts = data.data ?? data;
    if (!posts.length) {
      postsEl.innerHTML = `<div class="text-center py-4" style="opacity:.65;">
        <i class="fas fa-newspaper fa-2x mb-2 d-block"></i> Aún no hay publicaciones.</div>`;
      return;
    }
    postsEl.innerHTML = posts.map(post => `
      <article class="card border-0 shadow-sm rounded-4 mb-3">
        <div class="card-body">
          <p class="mb-2">${post.content}</p>
          ${post.media_path ? `<img src="http://localhost:8000/uploads/${post.media_path}"
            class="img-fluid rounded-4 border" style="max-height:320px;object-fit:cover;width:100%;">` : ''}
          <div class="d-flex gap-3 mt-3" style="font-size:14px;opacity:.85;">
            <span><i class="fas fa-heart me-1"></i>${post.likes_count ?? 0}</span>
            <span><i class="fas fa-comment me-1"></i>${post.comments_count ?? 0}</span>
          </div>
        </div>
      </article>
    `).join('');
  } catch (e) {
    postsEl.innerHTML = `<div class="text-center py-4 text-danger">Error al cargar publicaciones.</div>`;
  }

  // ── Búsqueda de usuarios ───────────────────────────────
  document.getElementById('btn-user-search').addEventListener('click', async () => {
    const q = document.getElementById('user-search-input').value.trim();
    if (!q) return;
    const tbody = document.getElementById('users-table-body');
    tbody.innerHTML = `<tr><td colspan="3" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>`;
    try {
      const data  = await Users.search(q);
      const users = data.data ?? data;
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-3" style="opacity:.65;">
          <i class="fas fa-user-slash me-2"></i>No se encontraron usuarios.</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="d-flex align-items-center gap-2">
            <img src="imagenes/default-profile.jpg" style="width:36px;height:36px;border-radius:999px;object-fit:cover;">
            <strong>@${u.username}</strong>
          </td>
          <td>${u.name}</td>
          <td>
            <a href="chat.html?with=${u.id}" class="btn btn-outline-secondary btn-sm">
              <i class="fas fa-comment-dots me-1"></i> Chat
            </a>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger">Error en la búsqueda.</td></tr>`;
    }
  });

});
</script>
</body>
</html>
