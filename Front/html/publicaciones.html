<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Publicaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<div class="contenedor mt-5">

  <!-- Buscador -->
  <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
    <input type="text" id="search-input" class="form-control"
           placeholder="Buscar publicaciones..." style="max-width:250px;">
    <select id="order-select" class="form-select" style="max-width:220px;">
      <option value="reciente">Más recientes</option>
      <option value="populares">Más populares</option>
    </select>
    <button class="btn btn-primary px-3" id="btn-search">
      <i class="fas fa-search"></i> Buscar
    </button>
  </div>

  <!-- Feed de publicaciones -->
  <div id="posts-feed">
    <div class="text-center py-5" style="opacity:.5;">
      <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
      <p>Cargando publicaciones...</p>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/publicaciones.js"></script>
</body>
</html>
