<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Publicaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">

</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<div class="contenedor mt-4">
  <div class="publicaciones-wrapper">

    <!-- Sidebar IZQUIERDA — Perfil -->
    <aside class="profile-sidebar" id="profile-sidebar">
      <div class="profile-sidebar__cover" id="profile-sidebar-cover"></div>
      <div class="profile-sidebar__body">
        <div class="profile-sidebar__avatar-wrap">
          <img class="profile-sidebar__avatar" id="profile-avatar"
               src="../images/default-profile.jpg" alt="Avatar">
        </div>
        <p class="profile-sidebar__name" id="profile-name">Cargando...</p>
        <p class="profile-sidebar__handle" id="profile-handle">@usuario</p>
        <a href="perfil.html" class="profile-sidebar__link">Ver perfil completo →</a>
      </div>
    </aside>
    <div class="feed-container">
      <!-- Buscador -->
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div class="d-flex gap-2 flex-grow-1">
          <input type="text" id="search-input" class="form-control"
                 placeholder="Buscar publicaciones..." style="max-width:250px;">
          <select id="order-select" class="form-select" style="max-width:150px;">
            <option value="reciente">Más recientes</option>
            <option value="populares">Más populares</option>
          </select>
          <button class="btn btn-primary px-3" id="btn-search">
            <i class="fas fa-search"></i> Buscar
          </button>
        </div>
      </div>

      <!-- Feed de publicaciones -->
      <div id="posts-feed">
        <div class="text-center py-5" style="opacity:.5;">
          <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
          <p>Cargando publicaciones...</p>
        </div>
      </div>
    </div>

    <!-- Barra lateral de amigos/chats (derecha) -->
    <aside class="friends-sidebar" id="friends-sidebar">
      <div class="friends-sidebar__header">
        <h3><i class="fas fa-user-friends"></i> AMIGOS</h3>
      </div>
      <div class="friends-sidebar__search">
        <div class="friends-search">
          <i class="fas fa-search"></i>
          <input type="text" id="friends-search-input" placeholder="Buscar amigo...">
        </div>
      </div>
      <div id="friends-list-container">
        <div class="text-center py-4" style="opacity:0.6;">
          <i class="fas fa-spinner fa-spin"></i> Cargando amigos...
        </div>
      </div>
    </aside>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/publicaciones.js"></script>
<script src="../js/publicaciones-perfil.js"></script>
</body>
</html>
