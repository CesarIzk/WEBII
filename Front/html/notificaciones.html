<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Notificaciones</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sections/notificaciones.css">
</head>
<body>

  <div id="mf-header"></div>
  <div id="mf-nav"></div>

  <main class="mf-notif-page">
    <section class="mf-notif-hero">
      <div class="container">
        <div class="mf-notif-hero__content">
          <div class="mf-notif-hero__icon">
            <i class="fas fa-bell"></i>
          </div>
          <div>
            <h1 class="mf-notif-title">Notificaciones</h1>
            <p class="mf-notif-subtitle">
              Aqui estan tus notificaciones
            </p>
          </div>
        </div>
      </div>
    </section>

    <section class="container mf-notif-wrapper">
      <div class="mf-notif-toolbar">
        
      </div>

      <section class="mf-notif-list">
        <!-- Cargado dinámicamente por notificaciones.js -->
      </section>
    </section>
  </main>

  <div id="mf-footer"></div>

  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/notificaciones.js"></script>
</body>
</html>
