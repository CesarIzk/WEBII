<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>MundialFan - Comunidad | Conecta con Fans del Fútbol</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sections/amigos.css">
  
  <style>
    html { scroll-behavior: smooth; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg, #f0f2f5); }
    ::-webkit-scrollbar-thumb { background: var(--btn, #b00000); border-radius: 10px; }
    
    /* Dropdown menu personalizado */
    .dropdown-menu-custom {
      position: absolute;
      right: 0;
      top: 35px;
      background: var(--card, #fff);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      padding: 0.5rem;
      min-width: 180px;
      z-index: 100;
      display: none;
    }
    
    .dropdown-menu-custom a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      color: var(--text, #050505);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    
    .dropdown-menu-custom a:hover {
      background: var(--bg, #e4e6eb);
    }
    
    .dropdown-menu-custom a i {
      width: 20px;
      color: var(--btn, #b00000);
    }
  </style>
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>


<!-- Sección principal de amigos -->
<section class="amigos-page">
  <div class="contenedor">
    <div class="amigos-topbar">
      <h2 class="titulo-seccion">
        <i class="fas fa-users"></i> 
        Mi Comunidad
      </h2>
      <div class="amigos-buscador">
        <i class="fas fa-search"></i>
        <input type="text" id="buscarPersona" placeholder="Buscar amigos...">
      </div>
    </div>

    <!-- Mis Amigos -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-friends"></i> Mis Amigos</h3>
        <span id="contadorAmigos" class="badge">0</span>
      </div>
      <div id="misAmigos" class="amigos-grid"></div>
    </div>

    <!-- Solicitudes Pendientes -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-clock"></i> Solicitudes</h3>
        <span id="contadorSolicitudes" class="badge">0</span>
      </div>
      <div id="solicitudesAmistad" class="amigos-grid"></div>
    </div>

    <!-- Sugerencias -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-plus"></i> Amigos que quizá conozcas</h3>
      </div>
      <div id="sugerenciasAmistad" class="amigos-grid"></div>
    </div>
  </div>
</section>

<div id="mf-footer"></div>

<script src="../js/components.js"></script>


<script>

const USUARIOS_EJEMPLO = [
  { id: 1, nombre: "Carlos Méndez", username: "@carlosm10", equipo: "Argentina", pais: "🇦🇷", online: true, amigosMutuos: 5, avatar: "https://wallpapers.com/images/hd/pretty-profile-pictures-nxkpy9du2vqmiyo4.jpg", cover: "https://picsum.photos/id/433/400/120" },
  { id: 2, nombre: "Laura Gómez", username: "@lauragomez", equipo: "España", pais: "🇪🇸", online: true, amigosMutuos: 3, avatar: "https://images.pexels.com/photos/1264210/pexels-photo-1264210.jpeg?cs=srgb&dl=pexels-andre-furtado-43594-1264210.jpg&fm=jpg", cover: "https://picsum.photos/id/15/400/120" },
  { id: 3, nombre: "Mateo Rodríguez", username: "@mateor9", equipo: "Brasil", pais: "🇧🇷", online: false, amigosMutuos: 8, avatar: "https://i.pinimg.com/474x/e6/45/bb/e645bb9ec66ac3f742853d558f2a2db8.jpg", cover: "https://picsum.photos/id/20/400/120" },
  { id: 4, nombre: "Valentina Silva", username: "@valefan", equipo: "Francia", pais: "🇫🇷", online: true, amigosMutuos: 2, avatar: "https://tse3.mm.bing.net/th/id/OIP.cMIt_J6HdjLRVR3g_sTsLwAAAA?rs=1&pid=ImgDetMain&o=7&rm=3", cover: "https://picsum.photos/id/26/400/120" },
  { id: 5, nombre: "Javier López", username: "@javierl7", equipo: "Alemania", pais: "🇩🇪", online: false, amigosMutuos: 4, avatar: "https://i.pinimg.com/236x/bc/e0/b5/bce0b52ea8fc991cbee757c6e6ba8a46.jpg", cover: "https://picsum.photos/id/28/400/120" },
  { id: 6, nombre: "Camila Torres", username: "@camilat", equipo: "Colombia", pais: "🇨🇴", online: true, amigosMutuos: 6, avatar: "https://i.pinimg.com/736x/12/78/e1/1278e16afe4d71c6beb8d75f0eedca89.jpg", cover: "https://picsum.photos/id/29/400/120" }
];



// Función para renderizar tarjetas de amigos
function renderizarAmigos(containerId, usuarios, esSolicitud = false) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  if (!usuarios || usuarios.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-user-friends"></i><p>No hay usuarios para mostrar</p></div>`;
    return;
  }
  
  container.innerHTML = usuarios.map(user => `
    <div class="amigo-card" data-user-id="${user.id}">
      <div class="amigo-cover" style="background-image: url('${user.cover || 'https://picsum.photos/id/1/400/120'}')"></div>
      <div class="amigo-avatar-wrapper">
        <div class="amigo-avatar" style="background-image: url('${user.avatar}'); background-size: cover;">
          <div class="amigo-status ${user.online ? 'online' : 'offline'}"></div>
        </div>
        <div class="amigo-menu" onclick="event.stopPropagation(); toggleMenu(this)">
          <i class="fas fa-ellipsis-h"></i>
          <div class="dropdown-menu-custom">
            <a href="#"><i class="fas fa-comment"></i> Enviar mensaje</a>
            <a href="#"><i class="fas fa-ban"></i> Eliminar amigo</a>
            <a href="#"><i class="fas fa-flag"></i> Reportar</a>
          </div>
        </div>
      </div>
      <div class="amigo-info">
        <h4>${user.nombre} ${user.pais ? `<i class="fas fa-flag"></i>` : ''}</h4>
        <div class="amigo-user">${user.username}</div>
        ${user.amigosMutuos ? `<div class="amigo-mutuos"><i class="fas fa-user-friends"></i> ${user.amigosMutuos} amigos en común</div>` : ''}
        <div class="amigo-equipo"><i class="fas fa-trophy"></i> ${user.equipo}</div>
        <div class="amigo-botones">
          ${esSolicitud ? `
            <button class="btn-amigo btn-amigo-primary" onclick="aceptarSolicitud(${user.id})"><i class="fas fa-check"></i> Aceptar</button>
            <button class="btn-amigo btn-amigo-danger" onclick="rechazarSolicitud(${user.id})"><i class="fas fa-times"></i> Rechazar</button>
          ` : `
            <button class="btn-amigo btn-amigo-primary" onclick="enviarMensaje(${user.id})"><i class="fas fa-comment"></i> Mensaje</button>
            <button class="btn-amigo btn-amigo-outline" onclick="verPerfil(${user.id})"><i class="fas fa-user"></i> Perfil</button>
          `}
        </div>
      </div>
    </div>
  `).join('');
}


function renderizarHistorias() {
  const container = document.getElementById('historiasGrid');
  if (!container) return;
  
  container.innerHTML = HISTORIAS.map(historia => `
    <div class="historia-card" onclick="verHistoria(${historia.id})">
      <div class="historia-avatar">
        <img src="${historia.avatar}" alt="${historia.nombre}">
      </div>
      <span>${historia.nombre}</span>
    </div>
  `).join('');
}


function toggleMenu(btn) {
  const dropdown = btn.querySelector('.dropdown-menu-custom');
  if (dropdown) {
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
  }
}

function aceptarSolicitud(id) {
  alert(`Solicitud de amistad aceptada (ID: ${id})`);
}

function rechazarSolicitud(id) {
  alert(`Solicitud rechazada (ID: ${id})`);
}

function enviarMensaje(id) {
  alert(`Abriendo chat con usuario ID: ${id}`);
}

function verPerfil(id) {
  alert(`Ver perfil del usuario ID: ${id}`);
}

function verHistoria(id) {
  alert(`Ver historia del usuario ID: ${id}`);
}

// Cerrar dropdowns al hacer click fuera
document.addEventListener('click', function(e) {
  if (!e.target.closest('.amigo-menu')) {
    document.querySelectorAll('.dropdown-menu-custom').forEach(dropdown => {
      dropdown.style.display = 'none';
    });
  }
});

// Inicializar con datos de ejemplo
document.addEventListener('DOMContentLoaded', function() {
  renderizarHistorias();
  renderizarAmigos('misAmigos', USUARIOS_EJEMPLO.slice(0, 3), false);
  renderizarAmigos('solicitudesAmistad', USUARIOS_EJEMPLO.slice(3, 5), true);
  renderizarAmigos('sugerenciasAmistad', USUARIOS_EJEMPLO.slice(5), false);
  
  // Actualizar contadores
  document.getElementById('contadorAmigos').innerText = '3';
  document.getElementById('contadorSolicitudes').innerText = '2';
  
  
  // Búsqueda
  const searchInput = document.getElementById('buscarPersona');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = USUARIOS_EJEMPLO.filter(u => 
        u.nombre.toLowerCase().includes(term) || 
        u.username.toLowerCase().includes(term) ||
        u.equipo.toLowerCase().includes(term)
      );
      renderizarAmigos('sugerenciasAmistad', filtered, false);
    });
  }
});
</script>

</body>
</html>
