<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>MundialFan - Comunidad | Conecta con Fans del Fútbol</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sections/amigos.css">
  
  <style>
    html { scroll-behavior: smooth; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg, #f0f2f5); }
    ::-webkit-scrollbar-thumb { background: var(--btn, #b00000); border-radius: 10px; }
    
    /* Dropdown menu personalizado */
    .dropdown-menu-custom {
      position: absolute;
      right: 0;
      top: 35px;
      background: var(--card, #fff);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      padding: 0.5rem;
      min-width: 180px;
      z-index: 100;
      display: none;
    }
    
    .dropdown-menu-custom a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      color: var(--text, #050505);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    
    .dropdown-menu-custom a:hover {
      background: var(--bg, #e4e6eb);
    }
    
    .dropdown-menu-custom a i {
      width: 20px;
      color: var(--btn, #b00000);
    }
  </style>
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>


<!-- Sección principal de amigos -->
<section class="amigos-page">
  <div class="contenedor">
    <div class="amigos-topbar">
      <h2 class="titulo-seccion">
        <i class="fas fa-users"></i> 
        Mi Comunidad
      </h2>
      <div class="amigos-buscador">
        <i class="fas fa-search"></i>
        <input type="text" id="buscarPersona" placeholder="Buscar amigos...">
      </div>
    </div>

    <!-- Mis Amigos -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-friends"></i> Mis Amigos</h3>
        <span id="contadorAmigos" class="badge">0</span>
      </div>
      <div id="misAmigos" class="amigos-grid"></div>
    </div>

    <!-- Solicitudes Pendientes -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-clock"></i> Solicitudes</h3>
        <span id="contadorSolicitudes" class="badge">0</span>
      </div>
      <div id="solicitudesAmistad" class="amigos-grid"></div>
    </div>

    <!-- Sugerencias -->
    <div class="amigos-bloque">
      <div class="bloque-header">
        <h3><i class="fas fa-user-plus"></i> Amigos que quizá conozcas</h3>
      </div>
      <div id="sugerenciasAmistad" class="amigos-grid"></div>
    </div>
  </div>
</section>

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>


<script src="../js/amigos.js"></script>

</body>
</html>
