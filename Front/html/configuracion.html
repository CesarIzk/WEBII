<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Configuración</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<div class="container py-5">
  <h2 class="mb-4 text-center"><i class="fas fa-cog"></i> Configuración de Perfil</h2>

  <div id="alert-box" style="display:none;"></div>

  <!-- INFORMACIÓN PERSONAL -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="fas fa-user"></i> Información Personal</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" id="cfg-name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Biografía</label>
        <textarea class="form-control" id="cfg-bio" rows="3"></textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Fecha de Nacimiento</label>
          <input type="date" class="form-control" id="cfg-birth">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Género</label>
          <select class="form-select" id="cfg-gender">
            <option value="">Prefiero no decirlo</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="O">Otro</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="cfg-email" required>
      </div>
      <button class="btn btn-primary" id="btn-save-profile">
        <i class="fas fa-save"></i> Guardar Cambios
      </button>
    </div>
  </div>

  <!-- FOTO DE PERFIL -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-secondary text-white">
      <h5 class="mb-0"><i class="fas fa-camera"></i> Actualizar Foto de Perfil</h5>
    </div>
    <div class="card-body">
      <div class="d-flex align-items-center gap-3 mb-3">
        <img id="cfg-avatar-preview" src="../images/default-profile.jpg" alt="Tu foto actual" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #ccc;">
        <div class="flex-grow-1">
          <label class="form-label">Selecciona una nueva foto</label>
          <input type="file" class="form-control mb-2" id="cfg-avatar" accept="image/*">
          <button class="btn btn-primary btn-sm" id="btn-save-avatar">
            <i class="fas fa-save"></i> Guardar Foto Seleccionada
          </button>
          <small class="text-muted d-block mt-1">JPG, PNG, GIF, WEBP. Máximo 5MB.</small>
        </div>
      </div>
    </div>
  </div>

  <!-- CAMBIO DE CONTRASEÑA -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0"><i class="fas fa-lock"></i> Cambiar Contraseña</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Contraseña Actual</label>
        <input type="password" class="form-control" id="cfg-pass-actual" autocomplete="new-password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" class="form-control" id="cfg-pass-nueva" minlength="4" autocomplete="new-password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar Nueva Contraseña</label>
        <input type="password" class="form-control" id="cfg-pass-confirmar" minlength="4" autocomplete="new-password" required>
      </div>
      <button class="btn btn-success" id="btn-save-password">
        <i class="fas fa-key"></i> Actualizar Contraseña
      </button>
    </div>
  </div>

  <!-- UBICACIÓN -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-info text-white">
      <h5 class="mb-0"><i class="fas fa-map-marker-alt"></i> Ubicación</h5>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Ciudad</label>
          <input type="text" class="form-control" id="cfg-city" placeholder="Ej. Monterrey">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">País</label>
          <input type="text" class="form-control" id="cfg-country" placeholder="Ej. México">
        </div>
      </div>
      <button class="btn btn-info text-white" id="btn-save-location">
        <i class="fas fa-floppy-disk"></i> Guardar Ubicación
      </button>
    </div>
  </div>

  <!-- ZONA DE PELIGRO -->
  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Zona de Peligro</h5>
    </div>
    <div class="card-body">
      <p>Dar de baja tu cuenta marcará tu perfil como inactivo y cerrará tu sesión inmediatamente.</p>
      <button class="btn btn-danger" id="btn-deactivate">
        <i class="fas fa-user-slash"></i> Dar de baja mi cuenta
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/configuracion.js"></script>
</body>
</html>
