<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Configuración</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<div class="container py-5">
  <h2 class="mb-4 text-center"><i class="fas fa-cog"></i> Configuración de Perfil</h2>

  <div id="alert-box" style="display:none;"></div>

  <!-- INFORMACIÓN PERSONAL -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="fas fa-user"></i> Información Personal</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" id="cfg-name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Biografía</label>
        <textarea class="form-control" id="cfg-bio" rows="3"></textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Fecha de Nacimiento</label>
          <input type="date" class="form-control" id="cfg-birth">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Género</label>
          <select class="form-select" id="cfg-gender">
            <option value="">Prefiero no decirlo</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="O">Otro</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="cfg-email" required>
      </div>
      <button class="btn btn-primary" id="btn-save-profile">
        <i class="fas fa-save"></i> Guardar Cambios
      </button>
    </div>
  </div>

  <!-- FOTO DE PERFIL -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-secondary text-white">
      <h5 class="mb-0"><i class="fas fa-camera"></i> Actualizar Foto de Perfil</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Selecciona una nueva foto</label>
        <input type="file" class="form-control" id="cfg-avatar" accept="image/*">
        <small class="text-muted d-block mt-1">JPG, PNG, GIF, WEBP. Máximo 5MB.</small>
      </div>
      <button class="btn btn-secondary" id="btn-save-avatar">
        <i class="fas fa-upload"></i> Subir nueva foto
      </button>
    </div>
  </div>

  <!-- CAMBIO DE CONTRASEÑA -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0"><i class="fas fa-lock"></i> Cambiar Contraseña</h5>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Contraseña Actual</label>
        <input type="password" class="form-control" id="cfg-pass-actual" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" class="form-control" id="cfg-pass-nueva" minlength="4" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar Nueva Contraseña</label>
        <input type="password" class="form-control" id="cfg-pass-confirmar" minlength="4" required>
      </div>
      <button class="btn btn-success" id="btn-save-password">
        <i class="fas fa-key"></i> Actualizar Contraseña
      </button>
    </div>
  </div>

  <!-- ZONA DE PELIGRO -->
  <div class="card shadow-sm border-danger">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Zona de Peligro</h5>
    </div>
    <div class="card-body">
      <p>Dar de baja tu cuenta marcará tu perfil como inactivo y cerrará tu sesión inmediatamente.</p>
      <button class="btn btn-danger" id="btn-deactivate">
        <i class="fas fa-user-slash"></i> Dar de baja mi cuenta
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

  if (!isLoggedIn()) {
    window.location.href = 'auth.html';
    return;
  }

  function showAlert(msg, type = 'success') {
    const box = document.getElementById('alert-box');
    box.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">
      ${msg}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>`;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }

  // ── Pre-cargar datos del perfil ────────────────────────
  try {
    const user = getUser();
    const data = await Users.getProfile(user.id);
    const u = data.data ?? data;
    document.getElementById('cfg-name').value  = u.name ?? '';
    document.getElementById('cfg-bio').value   = u.bio ?? '';
    document.getElementById('cfg-birth').value = u.birth_date ?? '';
    document.getElementById('cfg-email').value = u.email ?? '';
    if (u.gender) document.getElementById('cfg-gender').value = u.gender;
  } catch (e) {
    const user = getUser();
    document.getElementById('cfg-name').value  = user?.name ?? '';
    document.getElementById('cfg-email').value = user?.email ?? '';
  }

  // ── Guardar perfil ─────────────────────────────────────
  document.getElementById('btn-save-profile').addEventListener('click', async () => {
    try {
      await Users.updateProfile({
        name:       document.getElementById('cfg-name').value.trim(),
        bio:        document.getElementById('cfg-bio').value.trim(),
        birth_date: document.getElementById('cfg-birth').value,
        gender:     document.getElementById('cfg-gender').value,
        email:      document.getElementById('cfg-email').value.trim(),
      });
      showAlert('✅ Perfil actualizado correctamente.');
    } catch (err) {
      showAlert(err.message || 'Error al guardar.', 'danger');
    }
  });

  // ── Subir avatar ───────────────────────────────────────
  document.getElementById('btn-save-avatar').addEventListener('click', async () => {
    const file = document.getElementById('cfg-avatar').files[0];
    if (!file) { showAlert('Selecciona una imagen primero.', 'warning'); return; }
    const formData = new FormData();
    formData.append('avatar', file);
    try {
      await Users.updateAvatar(formData);
      showAlert('✅ Foto de perfil actualizada.');
    } catch (err) {
      showAlert(err.message || 'Error al subir la foto.', 'danger');
    }
  });

  // ── Cambiar contraseña ─────────────────────────────────
  document.getElementById('btn-save-password').addEventListener('click', async () => {
    const actual    = document.getElementById('cfg-pass-actual').value;
    const nueva     = document.getElementById('cfg-pass-nueva').value;
    const confirmar = document.getElementById('cfg-pass-confirmar').value;
    if (nueva !== confirmar) { showAlert('Las contraseñas no coinciden.', 'danger'); return; }
    try {
      await Users.updatePassword(actual, nueva);
      showAlert('✅ Contraseña actualizada.');
      document.getElementById('cfg-pass-actual').value = '';
      document.getElementById('cfg-pass-nueva').value  = '';
      document.getElementById('cfg-pass-confirmar').value = '';
    } catch (err) {
      showAlert(err.message || 'Error al cambiar contraseña.', 'danger');
    }
  });

  // ── Dar de baja ────────────────────────────────────────
  document.getElementById('btn-deactivate').addEventListener('click', async () => {
    if (!confirm('¿Estás seguro de que deseas dar de baja tu cuenta?')) return;
    try {
      await Users.deactivate();
      Auth.logout();
    } catch (err) {
      showAlert(err.message || 'Error al dar de baja la cuenta.', 'danger');
    }
  });

});
</script>
</body>
</html>
