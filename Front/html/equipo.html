<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Equipos</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<section class="hero hero-equipos">
  <div class="hero-contenido">
    <h2>Equipos del Mundial</h2>
    <p>Selecciona un país para ver su historia, logros y material multimedia.</p>
  </div>
</section>

<section class="caracteristicas">
  <div class="contenedor">
    <h2 class="titulo-seccion">Explora las Selecciones Nacionales</h2>

    <!-- Buscador rápido -->
    <div class="mb-4">
      <input type="text" id="search-country" class="form-control"
             placeholder="Buscar país..." style="max-width: 320px;">
    </div>

    <!-- Galería de banderas -->
    <div class="paises-grid" id="paises-grid">
      <div class="text-center py-5" style="opacity:.5; grid-column: 1/-1;">
        <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
        <p>Cargando países...</p>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {

  const grid = document.getElementById('paises-grid');
  let allCountries = [];

  function renderCountries(list) {
    if (!list.length) {
      grid.innerHTML = `<p class="text-center text-muted py-5" style="grid-column:1/-1;">
        No hay países registrados actualmente.</p>`;
      return;
    }
    grid.innerHTML = list.map(c => {
      const flagSrc = c.flag
        ? `http://localhost:8000/uploads/${c.flag}`
        : `imagenes/default-profile.jpg`;
      return `
        <article class="team-card">
          <a class="team-card__link" href="pais_detalle.html?id=${c.id}"
             aria-label="Ver información de ${c.name}">
            <img class="team-card__flag" src="${flagSrc}" alt="Bandera de ${c.name}">
            <h3 class="team-card__name">${c.name}</h3>
            <p class="team-card__meta">${c.continent ?? ''}</p>
          </a>
        </article>
      `;
    }).join('');
  }

  document.getElementById('search-country').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    renderCountries(q
      ? allCountries.filter(c => c.name.toLowerCase().includes(q))
      : allCountries
    );
  });

  try {
    const data = await Countries.getAll();
    allCountries = data.data ?? data;
    renderCountries(allCountries);
  } catch (e) {
    grid.innerHTML = `<p class="text-center text-danger py-5" style="grid-column:1/-1;">
      Error al cargar países.</p>`;
  }

});
</script>
</body>
</html>
