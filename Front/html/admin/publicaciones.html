<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan Admin — Publicaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="adm-shell">
  <header class="adm-topbar" id="adm-topbar"></header>
  <nav    class="adm-sidebar" id="adm-sidebar"></nav>

  <main class="adm-main">
    <h1 class="adm-page-title"><i class="fas fa-newspaper"></i> Publicaciones</h1>
    <div id="page-alert" class="adm-alert"></div>

    <div class="adm-card">
      <div class="adm-toolbar">
        <input class="adm-input" id="search-input" placeholder="Buscar por contenido o autor...">
        <select class="adm-select" id="filter-status" style="max-width:160px;">
          <option value="">Todos los estados</option>
          <option value="public">Públicas</option>
          <option value="hidden">Ocultas</option>
        </select>
        <select class="adm-select" id="filter-type" style="max-width:160px;">
          <option value="">Todos los tipos</option>
          <option value="text">Solo texto</option>
          <option value="image">Imagen</option>
          <option value="video">Video</option>
        </select>
        <button class="adm-btn adm-btn--ghost" id="btn-search"><i class="fas fa-search"></i> Buscar</button>
      </div>

      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead>
            <tr>
              <th>Autor</th>
              <th>Contenido</th>
              <th>Tipo</th>
              <th>Categoría</th>
              <th>Likes</th>
              <th>Comentarios</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="posts-tbody">
            <tr><td colspan="9" class="adm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script src="js/publicaciones.js"></script>


<!-- Estilos adicionales para el nuevo botón info -->
<style>
  .adm-btn--info {
    background: #f20222;
    color: white;
  }
  .adm-btn--info:hover {
    background: #0b5ed7;
  }
</style>
</body>
</html>
