<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan Admin — Publicación</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .post-view-container {
      max-width: 700px;
      margin: 0 auto;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--adm-surface);
      padding: 8px 16px;
      border-radius: 30px;
      text-decoration: none;
      color: var(--adm-text);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--adm-border);
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background: var(--adm-surface2);
      color: var(--adm-text);
    }
    
    .mf-post {
      background: var(--adm-surface);
      border-radius: 16px;
      border: 1px solid var(--adm-border);
      overflow: hidden;
    }
    
    .mf-post .card-body {
      padding: 1.5rem;
    }
    
    .post-media {
      max-width: 100%;
      max-height: 400px;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 1rem;
    }
    
    video.post-media {
      background: #000;
    }
    
    .comment-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .loading-spinner, .error-message {
      text-align: center;
      padding: 3rem;
      background: var(--adm-surface);
      border-radius: 16px;
      color: var(--adm-muted);
    }
    
    .bg-light-custom {
      background: var(--adm-surface2);
      border-color: var(--adm-border);
    }
    
    .text-muted-custom {
      color: var(--adm-muted) !important;
    }
    
    .form-control-custom {
      background: var(--adm-surface2);
      border: 1px solid var(--adm-border);
      color: var(--adm-text);
      border-radius: 20px;
      padding: 8px 16px;
      width: 100%;
    }
    
    .form-control-custom:focus {
      outline: none;
      border-color: var(--adm-accent);
    }
    
    .btn-outline-secondary-custom {
      background: transparent;
      border: 1px solid var(--adm-border);
      color: var(--adm-muted);
      transition: all 0.2s;
    }
    
    .btn-outline-secondary-custom:hover {
      background: var(--adm-surface2);
      border-color: var(--adm-accent);
      color: var(--adm-text);
    }
    
    .btn-outline-danger {
      background: transparent;
      border: 1px solid var(--adm-accent);
      color: var(--adm-accent2);
    }
    
    .btn-outline-danger:hover {
      background: var(--adm-accent);
      color: white;
    }
  </style>
</head>
<body>
<div class="adm-shell">
  <header class="adm-topbar" id="adm-topbar"></header>
  <nav class="adm-sidebar" id="adm-sidebar"></nav>

  <main class="adm-main">
    <div class="post-view-container">
      <a href="publicaciones.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Volver a Publicaciones
      </a>

      <div id="post-detail">
        <div class="loading-spinner">
          <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
          <p>Cargando publicación...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script src="js/post.js"></script>
</body>
</html>
