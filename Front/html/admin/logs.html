<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan Admin — Logs</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .log-entry{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 1.25rem;
               border-bottom:1px solid var(--adm-border);font-size:.82rem;font-family:monospace;}
    .log-entry:hover{background:var(--adm-surface2);}
    .log-level{padding:.15rem .45rem;border-radius:5px;font-size:.7rem;font-weight:700;
               letter-spacing:.5px;text-transform:uppercase;flex-shrink:0;width:52px;text-align:center;}
    .log-level.info   {background:rgba(52,152,219,.18);color:#3498db;}
    .log-level.warn   {background:rgba(243,156,18,.18);color:#f39c12;}
    .log-level.error  {background:rgba(231,76,60,.18);color:#e74c3c;}
    .log-level.debug  {background:rgba(122,128,153,.18);color:#95a5a6;}
    .log-time{color:var(--adm-muted);white-space:nowrap;flex-shrink:0;}
    .log-msg{flex:1;word-break:break-all;color:var(--adm-text);}
    #log-container{max-height:600px;overflow-y:auto;}
    .log-toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:.65rem;
                 padding:.85rem 1.25rem;border-bottom:1px solid var(--adm-border);}
  </style>
</head>
<body>
<div class="adm-shell">
  <header class="adm-topbar" id="adm-topbar"></header>
  <nav    class="adm-sidebar" id="adm-sidebar"></nav>

  <main class="adm-main">
    <h1 class="adm-page-title"><i class="fas fa-terminal"></i> Logs del Sistema</h1>

    <div class="adm-card">
      <div class="log-toolbar">
        <select class="adm-select" id="filter-level" style="max-width:140px;">
          <option value="">Todos los niveles</option>
          <option value="info">INFO</option>
          <option value="warn">WARN</option>
          <option value="error">ERROR</option>
          <option value="debug">DEBUG</option>
        </select>
        <input class="adm-input" id="filter-search" placeholder="Buscar en logs..." style="max-width:260px;">
        <button class="adm-btn adm-btn--ghost" id="btn-search"><i class="fas fa-search"></i> Filtrar</button>
        <button class="adm-btn adm-btn--ghost" id="btn-refresh" title="Actualizar">
          <i class="fas fa-rotate-right"></i> Actualizar
        </button>
        <div style="margin-left:auto;display:flex;gap:.5rem;">
          <button class="adm-btn adm-btn--danger" id="btn-clear" title="Limpiar logs">
            <i class="fas fa-trash"></i> Limpiar logs
          </button>
        </div>
      </div>

      <!-- Contador -->
      <div style="padding:.5rem 1.25rem;font-size:.78rem;color:var(--adm-muted);border-bottom:1px solid var(--adm-border);">
        <span id="log-count">—</span> entradas
        <span style="margin:0 .5rem;">·</span>
        <span id="log-updated">—</span>
      </div>

      <div id="log-container">
        <div class="adm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando logs...</div>
      </div>
    </div>
  </main>
</div>

<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {

  let allLogs = [];

  function renderLogs(list) {
    const container = document.getElementById('log-container');
    document.getElementById('log-count').textContent = list.length;
    if (!list.length) {
      container.innerHTML = '<div class="adm-empty"><i class="fas fa-check-circle"></i>Sin entradas de log</div>';
      return;
    }
    container.innerHTML = list.map(log => `
      <div class="log-entry">
        <span class="log-level ${(log.level||'info').toLowerCase()}">${(log.level||'INFO').toUpperCase()}</span>
        <span class="log-time">${log.timestamp ?? log.created_at ?? '—'}</span>
        <span class="log-msg">${escHtml(log.message ?? log.msg ?? JSON.stringify(log))}</span>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function applyFilters() {
    const level  = document.getElementById('filter-level').value.toLowerCase();
    const search = document.getElementById('filter-search').value.toLowerCase();
    let list = allLogs;
    if (level)  list = list.filter(l => (l.level||'').toLowerCase() === level);
    if (search) list = list.filter(l => (l.message ?? l.msg ?? '').toLowerCase().includes(search));
    renderLogs(list);
  }

  async function loadLogs() {
    document.getElementById('log-container').innerHTML =
      '<div class="adm-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>';
    try {
      const data = await adminFetch('/admin/logs');
      allLogs = data.data ?? data;
      document.getElementById('log-updated').textContent =
        'Actualizado: ' + new Date().toLocaleTimeString('es-MX');
      applyFilters();
    } catch(e) {
      document.getElementById('log-container').innerHTML =
        `<div class="adm-empty"><i class="fas fa-exclamation-circle" style="color:var(--adm-accent2);"></i>
         Error al cargar logs: ${e.message || 'Sin conexión con el backend'}</div>`;
      document.getElementById('log-count').textContent = '0';
    }
  }

  document.getElementById('btn-search').addEventListener('click', applyFilters);
  document.getElementById('filter-search').addEventListener('keydown', e => e.key === 'Enter' && applyFilters());
  document.getElementById('filter-level').addEventListener('change', applyFilters);
  document.getElementById('btn-refresh').addEventListener('click', loadLogs);

  document.getElementById('btn-clear').addEventListener('click', () => {
    confirmAction('¿Limpiar todos los logs? Esta acción no se puede deshacer.', async () => {
      try {
        await adminFetch('/admin/logs', { method: 'DELETE' });
        allLogs = [];
        renderLogs([]);
      } catch(e) {
        showAlert && console.warn('No se pudo limpiar logs:', e);
      }
    });
  });

  loadLogs();
});
</script>
</body>
</html>
