<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MundialFan - Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="chat-app-body">

<div id="mf-header"></div>
<div id="mf-nav"></div>

<!-- ═══════════ CONTENIDO ÚNICO DE ESTA PÁGINA ═══════════ -->

<main class="chat-page">
  <div class="chat-shell">

    <!-- Sidebar -->
    <aside class="chat-sidebar" aria-label="Lista de chats">
      <div class="chat-sidebar__top">
        <h2 class="chat-sidebar__title">Chats</h2>
        <button class="chat-icon-btn" type="button" title="Nuevo chat">
          <i class="fas fa-pen-to-square"></i>
        </button>
      </div>

      <div class="chat-sidebar__search">
        <div class="chat-search">
          <i class="fas fa-search"></i>
          <input type="text" id="chat-search-input" placeholder="Buscar en chats..." aria-label="Buscar chats">
        </div>
      </div>

      <ul class="chat-list" id="chat-list">
        <div class="text-center py-4" style="opacity:0.5;"><i class="fas fa-spinner fa-spin"></i> Cargando amigos...</div>
      </ul>
    </aside>

    <!-- Conversación -->
    <section class="chat-main" aria-label="Conversación">
      <div class="chat-topbar">
        <div class="chat-topbar__left" id="chat-topbar-left">
          <div class="chat-topbar__title">
            <h2>Selecciona un chat</h2>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="text-center py-5" style="opacity:0.5;">
          <p>Selecciona un amigo de la lista para comenzar a chatear.</p>
        </div>
      </div>

      <div class="chat-composer">
        <input id="chat-attach-input" type="file" accept="image/*,video/*" multiple hidden>
        <label class="chat-attach" for="chat-attach-input" title="Adjuntar foto o video">
          <i class="fas fa-paperclip"></i>
        </label>
        <textarea class="chat-input" id="chat-text-input" rows="1"
                  placeholder="Escribe un mensaje..." aria-label="Escribir mensaje"></textarea>
        <button class="chat-send" id="btn-send" type="button" title="Enviar">
          <i class="fas fa-paper-plane"></i> <span>Enviar</span>
        </button>
      </div>
    </section>

  </div>
</main>

<!-- Visor de Multimedia (Lightbox) -->
<div id="media-viewer" class="media-viewer" style="display:none;">
  <div class="media-viewer__header">
    <button id="media-viewer-close" class="media-viewer__close" title="Cerrar"><i class="fas fa-times"></i></button>
  </div>
  <div id="media-viewer-content" class="media-viewer__content"></div>
</div>

<!-- ═══════════════════════════════════════════════════════ -->

<div id="mf-footer"></div>

<script src="../js/components.js"></script>
<script src="../js/api.js"></script>
<script src="../js/chat.js"></script>
</body>
</html>
